---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: default
  labels:
    app: k8s-resource-optimizer
    component: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-resource-optimizer
      component: ml-service
  template:
    metadata:
      labels:
        app: k8s-resource-optimizer
        component: ml-service
    spec:
      containers:
        - name: ml-service
          image: berkayyvz/k8s-resource-optimizer-ml:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TF_CPP_MIN_LOG_LEVEL
              value: "2"  # Reduce TensorFlow logging
