# Demo workloads for the optimizer to analyze
# These create sample pods that Prometheus will monitor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nginx
  namespace: default
  labels:
    app: demo-nginx
    purpose: optimizer-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-nginx
  template:
    metadata:
      labels:
        app: demo-nginx
        purpose: optimizer-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-stress
  namespace: default
  labels:
    app: demo-stress
    purpose: optimizer-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-stress
  template:
    metadata:
      labels:
        app: demo-stress
        purpose: optimizer-demo
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                # Simulate variable CPU usage
                dd if=/dev/urandom bs=1024 count=100 of=/dev/null 2>/dev/null
                sleep 5
              done
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-memory
  namespace: default
  labels:
    app: demo-memory
    purpose: optimizer-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-memory
  template:
    metadata:
      labels:
        app: demo-memory
        purpose: optimizer-demo
    spec:
      volumes:
        - name: memory-cache
          emptyDir:
            medium: Memory
            sizeLimit: 160Mi
      containers:
        - name: memory-worker
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              dd if=/dev/zero of=/cache/payload bs=1M count=96
              while true; do
                cat /cache/payload >/dev/null
                sleep 3
              done
          volumeMounts:
            - name: memory-cache
              mountPath: /cache
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
