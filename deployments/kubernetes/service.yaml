---
apiVersion: v1
kind: Service
metadata:
  name: k8s-resource-optimizer
  namespace: default
  labels:
    app: k8s-resource-optimizer
    component: optimizer
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: k8s-resource-optimizer
    component: optimizer

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: default
  labels:
    app: k8s-resource-optimizer
    component: ml-service
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: k8s-resource-optimizer
    component: ml-service
