---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-resource-optimizer
  namespace: default
  labels:
    app: k8s-resource-optimizer
    component: optimizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-resource-optimizer
      component: optimizer
  template:
    metadata:
      labels:
        app: k8s-resource-optimizer
        component: optimizer
    spec:
      serviceAccountName: k8s-resource-optimizer
      containers:
        - name: optimizer
          image: berkayyvz/k8s-resource-optimizer:latest
          imagePullPolicy: Always
          command: ["./optimizer"]
          args:
            - "-config"
            - "/etc/optimizer/config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/optimizer
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: optimizer-config
